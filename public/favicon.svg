<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Lollipop stick -->
  <line x1="44" y1="44" x2="58" y2="58" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

  <!-- Lollipop candy circle -->
  <circle cx="36" cy="36" r="14" fill="#FF6B9D"/>
  <circle cx="36" cy="36" r="14" fill="none" stroke="#FF2D78" stroke-width="1.5"/>

  <!-- Candy swirl -->
  <path d="M36 22 Q44 28 40 36 Q36 44 28 40 Q22 34 28 28 Q32 24 36 22"
        fill="none" stroke="#FFB3CC" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 22 Q30 26 30 32 Q30 40 36 40"
        fill="none" stroke="#FFD6E8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Dragon body -->
  <ellipse cx="20" cy="24" rx="13" ry="9" fill="#4ECDC4" transform="rotate(-20 20 24)"/>

  <!-- Dragon head -->
  <ellipse cx="10" cy="14" rx="8" ry="6" fill="#45B7AA" transform="rotate(-10 10 14)"/>

  <!-- Dragon snout -->
  <ellipse cx="5" cy="13" rx="4" ry="3" fill="#3AA89E" transform="rotate(-10 5 13)"/>

  <!-- Dragon eye -->
  <circle cx="9" cy="11" r="2" fill="#fff"/>
  <circle cx="9" cy="11" r="1.2" fill="#2D2D2D"/>
  <circle cx="9.5" cy="10.5" r="0.4" fill="#fff"/>

  <!-- Dragon nostril -->
  <circle cx="4.5" cy="13.5" r="0.8" fill="#2D5F5C"/>

  <!-- Dragon horn -->
  <path d="M11 7 Q13 3 16 5 Q14 8 11 7Z" fill="#FF9F43"/>

  <!-- Dragon ear/frill -->
  <path d="M16 9 Q20 6 21 10 Q18 11 16 9Z" fill="#FF6B9D"/>

  <!-- Dragon wing -->
  <path d="M24 20 Q34 10 38 16 Q32 18 28 22 Q26 21 24 20Z" fill="#FF9F43" opacity="0.85"/>
  <path d="M24 20 Q34 10 38 16" fill="none" stroke="#E8860A" stroke-width="1" stroke-linecap="round"/>

  <!-- Wing membrane lines -->
  <line x1="24" y1="20" x2="34" y2="13" stroke="#E8860A" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="26" y1="21" x2="36" y2="14.5" stroke="#E8860A" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Dragon tail -->
  <path d="M28 30 Q22 38 18 36 Q16 32 20 30 Q24 34 28 30Z" fill="#4ECDC4"/>
  <path d="M18 36 Q14 40 16 44 Q20 42 18 36Z" fill="#FF9F43"/>

  <!-- Dragon feet/claws -->
  <path d="M16 31 Q12 34 10 33 Q11 31 14 30Z" fill="#3AA89E"/>
  <path d="M10 33 Q8 35 7 34" stroke="#2D5F5C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M10 33 Q9 36 8 36" stroke="#2D5F5C" stroke-width="1.2" stroke-linecap="round"/>
</svg>
